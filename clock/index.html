<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Clock · Xeneon Widget</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;700;900&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#000;
    --ink:#fff;
    --dim:#9a9a9a;
    --line:rgba(255,255,255,.12);
    --accent:#fff;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:var(--bg);color:var(--ink);font-family:"Archivo",system-ui,sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;color:inherit;border:none;background:none;cursor:pointer}
  input{font-family:inherit;color:inherit;background:none;border:none;outline:none}

  .shell{position:fixed;inset:0;display:flex;flex-direction:column;padding:3vmin;gap:2vmin}
  .mono{font-family:"JetBrains Mono",ui-monospace,monospace;letter-spacing:.04em}

  /* top label */
  .top{display:flex;justify-content:space-between;align-items:center;font-size:clamp(9px,1.1vmin,13px);letter-spacing:.22em;text-transform:uppercase;color:var(--dim)}
  .top em{font-style:normal;color:var(--ink)}
  .top .edit{cursor:pointer;transition:color .15s}
  .top .edit:hover{color:var(--ink)}

  /* primary clock */
  .hero{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:1.2vmin;padding:1.5vmin 0;
  }
  .hero-city{font-size:clamp(12px,1.6vmin,18px);letter-spacing:.2em;text-transform:uppercase;color:var(--dim)}
  .hero-time{
    font-family:"Archivo";font-weight:900;letter-spacing:-.05em;line-height:.82;
    font-size:clamp(90px,22vmin,260px);
    background:linear-gradient(180deg,#fff 0%, #8a8a8a 100%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;
    font-variant-numeric:tabular-nums;display:flex;align-items:baseline;
  }
  .hero-time .sec{font-size:.32em;color:var(--dim);margin-left:.15em;font-weight:700;-webkit-text-fill-color:var(--dim)}
  .hero-date{font-size:clamp(14px,2.2vmin,28px);color:#ddd;font-weight:500}
  .hero-date em{font-family:"Instrument Serif",serif;font-style:italic;font-weight:400;color:#fff}

  /* secondary clocks */
  .row{
    display:grid;gap:1.5vmin;flex:1;min-height:0;
    grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  }
  .city{
    border:1px solid var(--line);border-radius:10px;padding:1.8vmin;
    display:flex;flex-direction:column;justify-content:space-between;gap:.8vmin;
    background:rgba(255,255,255,.012);transition:border-color .2s;
    min-height:0;
  }
  .city:hover{border-color:rgba(255,255,255,.25)}
  .city-name{font-size:clamp(10px,1.3vmin,14px);letter-spacing:.18em;text-transform:uppercase;color:var(--dim);display:flex;justify-content:space-between;align-items:center}
  .city-time{font-size:clamp(24px,4.2vmin,46px);font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.02em;line-height:1}
  .city-meta{font-size:clamp(9px,1.1vmin,12px);color:var(--dim);font-family:"JetBrains Mono",monospace;letter-spacing:.06em;text-transform:uppercase;display:flex;justify-content:space-between}
  .city-diff{color:#fff}
  .city-diff.negative{color:#ff9f9f}

  /* edit modal */
  .edit-modal{
    position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(12px);
    display:none;align-items:center;justify-content:center;z-index:100;padding:20px;
  }
  .edit-modal.visible{display:flex}
  .edit-panel{
    width:min(100%,520px);background:#0b0b0b;border:1px solid var(--line);border-radius:14px;
    padding:22px;display:flex;flex-direction:column;gap:14px;
  }
  .edit-panel h2{font-size:16px;font-weight:900;letter-spacing:-.01em;display:flex;justify-content:space-between;align-items:center}
  .edit-panel h2 .x{cursor:pointer;color:var(--dim);font-weight:400;font-size:18px}
  .edit-panel h2 .x:hover{color:#fff}
  .edit-panel label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.18em;color:var(--dim);margin-bottom:5px}
  .edit-row{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;align-items:end}
  .edit-panel input[type="text"],.edit-panel select{
    width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;
    background:#000;font-size:12px;
  }
  .edit-panel select{font-family:inherit}
  .edit-list{display:flex;flex-direction:column;gap:6px;max-height:200px;overflow-y:auto}
  .edit-item{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;padding:8px 12px;border:1px solid var(--line);border-radius:8px;font-size:12px}
  .edit-item .del{cursor:pointer;color:#ff9f9f;font-family:"JetBrains Mono",monospace;font-size:11px}
  .edit-item .del:hover{color:#ff6b6b}
  .edit-actions{display:flex;gap:8px;justify-content:flex-end;border-top:1px solid var(--line);padding-top:12px;margin-top:4px}
  .btn{padding:9px 14px;border:1px solid var(--line);border-radius:8px;font-size:12px;cursor:pointer;letter-spacing:.02em}
  .btn:hover{background:rgba(255,255,255,.04)}
  .btn-primary{background:#fff;color:#000;border-color:#fff;font-weight:700}
  .btn-primary:hover{background:#ddd}

  .hidden{display:none !important}
</style>
</head>
<body>
<div class="shell">
  <div class="top">
    <span>Xeneon · <em id="primaryLabel">Local</em></span>
    <span class="edit" id="editBtn">EDIT CITIES</span>
  </div>

  <section class="hero">
    <div class="hero-city" id="primaryCity">Your Timezone</div>
    <div class="hero-time"><span id="primaryHM">—</span><span class="sec" id="primarySec">00</span></div>
    <div class="hero-date" id="primaryDate">—</div>
  </section>

  <section class="row" id="row"></section>
</div>

<!-- Edit modal -->
<div class="edit-modal" id="editModal">
  <div class="edit-panel">
    <h2>World clocks <span class="x" id="closeBtn">✕</span></h2>
    <div>
      <div class="edit-list" id="list"></div>
    </div>
    <div>
      <label>Add a city</label>
      <div class="edit-row">
        <input type="text" id="newLabel" placeholder="Label (e.g. Istanbul)" />
        <select id="newTz"></select>
        <button class="btn btn-primary" id="addBtn">Add</button>
      </div>
    </div>
    <div class="edit-actions">
      <button class="btn" id="resetBtn">Reset to defaults</button>
      <button class="btn btn-primary" id="doneBtn">Done</button>
    </div>
  </div>
</div>

<script>
(() => {
  const STORAGE = "xw.clock.cities";
  const DEFAULTS = [
    { label: "Istanbul", tz: "Europe/Istanbul" },
    { label: "New York", tz: "America/New_York" },
    { label: "London", tz: "Europe/London" },
    { label: "Tokyo", tz: "Asia/Tokyo" },
  ];

  const $ = s => document.querySelector(s);

  const load = () => {
    try {
      const v = JSON.parse(localStorage.getItem(STORAGE));
      if (Array.isArray(v) && v.length) return v;
    } catch(_) {}
    return DEFAULTS;
  };
  const save = cities => localStorage.setItem(STORAGE, JSON.stringify(cities));
  let cities = load();

  const localTz = Intl.DateTimeFormat().resolvedOptions().timeZone;

  // supported timezones (subset of Intl)
  const TZS = Intl.supportedValuesOf ? Intl.supportedValuesOf("timeZone") : [
    "America/New_York","America/Los_Angeles","America/Chicago","America/Denver",
    "Europe/London","Europe/Paris","Europe/Berlin","Europe/Istanbul","Europe/Moscow",
    "Asia/Tokyo","Asia/Shanghai","Asia/Hong_Kong","Asia/Singapore","Asia/Dubai","Asia/Kolkata",
    "Australia/Sydney","Pacific/Auckland",localTz
  ];

  // populate <select>
  const selEl = $("#newTz");
  TZS.forEach(tz => {
    const o = document.createElement("option");
    o.value = tz; o.textContent = tz;
    selEl.appendChild(o);
  });
  selEl.value = "Europe/Istanbul";

  // formatting
  const partsInTz = (d, tz) => {
    const f = new Intl.DateTimeFormat("en-GB", {
      timeZone: tz, hour12: false,
      year:"numeric", month:"short", day:"2-digit", weekday:"long",
      hour:"2-digit", minute:"2-digit", second:"2-digit",
    });
    const parts = {};
    for (const p of f.formatToParts(d)) parts[p.type] = p.value;
    return parts;
  };

  const offsetFromLocal = tz => {
    // Returns hours offset from local time, e.g. -5 or +3
    const d = new Date();
    const local = d.getTime();
    const tzDate = new Date(d.toLocaleString("en-US",{timeZone:tz}));
    const localDate = new Date(d.toLocaleString("en-US",{timeZone:localTz}));
    return Math.round((tzDate - localDate) / 3600000);
  };

  // render
  const renderPrimary = () => {
    const now = new Date();
    const p = partsInTz(now, localTz);
    $("#primaryHM").textContent = `${p.hour}:${p.minute}`;
    $("#primarySec").textContent = p.second;
    $("#primaryDate").innerHTML = `<em>${p.weekday}</em> · ${p.day} ${p.month} ${p.year}`;
    $("#primaryCity").textContent = localTz.replace(/_/g, " ");
    $("#primaryLabel").textContent = localTz.split("/").pop().replace(/_/g, " ");
  };

  const renderRow = () => {
    const row = $("#row");
    row.innerHTML = "";
    const now = new Date();
    for (const c of cities) {
      const p = partsInTz(now, c.tz);
      const diff = offsetFromLocal(c.tz);
      const diffStr = diff === 0 ? "SAME" : (diff > 0 ? `+${diff}H` : `${diff}H`);
      const div = document.createElement("div");
      div.className = "city";
      div.innerHTML = `
        <div class="city-name"><span>${c.label}</span></div>
        <div class="city-time">${p.hour}:${p.minute}</div>
        <div class="city-meta">
          <span>${p.weekday.slice(0,3).toUpperCase()} ${p.day} ${p.month.toUpperCase()}</span>
          <span class="city-diff ${diff < 0 ? 'negative' : ''}">${diffStr}</span>
        </div>`;
      row.appendChild(div);
    }
  };

  const renderAll = () => {
    renderPrimary();
    renderRow();
  };
  renderAll();
  setInterval(renderAll, 1000);

  // edit modal
  const renderList = () => {
    const list = $("#list");
    list.innerHTML = "";
    cities.forEach((c, i) => {
      const div = document.createElement("div");
      div.className = "edit-item";
      div.innerHTML = `<span><strong>${c.label}</strong> <span style="color:#888">· ${c.tz}</span></span><span class="del" data-i="${i}">REMOVE</span>`;
      list.appendChild(div);
    });
    list.querySelectorAll(".del").forEach(el => {
      el.onclick = () => { cities.splice(+el.dataset.i, 1); save(cities); renderList(); renderRow(); };
    });
  };

  $("#editBtn").onclick = () => { $("#editModal").classList.add("visible"); renderList(); };
  $("#closeBtn").onclick = $("#doneBtn").onclick = () => $("#editModal").classList.remove("visible");
  $("#addBtn").onclick = () => {
    const label = $("#newLabel").value.trim();
    const tz = selEl.value;
    if (!label) return;
    cities.push({label, tz});
    save(cities); renderList(); renderRow();
    $("#newLabel").value = "";
  };
  $("#resetBtn").onclick = () => {
    cities = JSON.parse(JSON.stringify(DEFAULTS));
    save(cities); renderList(); renderRow();
  };
})();
</script>
</body>
</html>
