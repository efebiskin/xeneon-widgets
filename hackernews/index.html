<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Hacker News · Xeneon Widget</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;700;900&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#000;
    --ink:#fff;
    --dim:#9a9a9a;
    --line:rgba(255,255,255,.12);
    --orange:#FF6600; /* HN orange */
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:var(--bg);color:var(--ink);font-family:"Archivo",system-ui,sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;color:inherit;border:none;background:none;cursor:pointer}
  a{color:inherit;text-decoration:none}

  .shell{position:fixed;inset:0;display:grid;grid-template-rows:auto 1fr auto;padding:2.5vmin 3vmin;gap:1.5vmin}
  .mono{font-family:"JetBrains Mono",ui-monospace,monospace;letter-spacing:.04em}

  .top{display:flex;justify-content:space-between;align-items:center}
  .brand{display:flex;align-items:center;gap:10px;font-size:clamp(10px,1.3vmin,14px);letter-spacing:.18em;text-transform:uppercase;color:var(--dim)}
  .brand em{font-style:normal;color:var(--ink);font-weight:800}
  .dot{width:11px;height:11px;background:var(--orange);border-radius:2px}
  .feeds{display:flex;gap:.4vmin}
  .feed{
    padding:.6vmin 1.2vmin;border:1px solid var(--line);border-radius:999px;
    font-size:clamp(8px,1.05vmin,11px);letter-spacing:.14em;text-transform:uppercase;color:var(--dim);cursor:pointer;
    transition:all .2s;
  }
  .feed:hover{border-color:rgba(255,255,255,.3);color:#fff}
  .feed.active{background:var(--orange);color:#fff;border-color:var(--orange);font-weight:700}

  /* list */
  .list{
    display:flex;flex-direction:column;gap:.5vmin;
    overflow-y:auto;padding-right:.4vmin;min-height:0;
  }
  .list::-webkit-scrollbar{width:6px}
  .list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:3px}

  .item{
    display:grid;grid-template-columns:auto 1fr auto;gap:1.2vmin;align-items:start;
    padding:1.2vmin;border:1px solid transparent;border-radius:8px;
    transition:all .15s;cursor:pointer;
  }
  .item:hover{background:rgba(255,255,255,.025);border-color:var(--line)}
  .item-rank{
    font-family:"JetBrains Mono",monospace;color:var(--orange);font-weight:700;
    font-size:clamp(12px,1.7vmin,18px);min-width:2.2ch;text-align:right;
    line-height:1.3;
  }
  .item-body{min-width:0}
  .item-title{font-size:clamp(13px,1.8vmin,18px);font-weight:600;line-height:1.3;margin-bottom:.4vmin;
    overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  .item-meta{font-family:"JetBrains Mono",monospace;font-size:clamp(9px,1.15vmin,12px);color:var(--dim);letter-spacing:.04em;display:flex;gap:1vmin;flex-wrap:wrap;align-items:center}
  .item-meta .host{color:#ddd}
  .item-meta .score{color:var(--orange)}
  .item-comments{
    display:flex;align-items:center;gap:.4vmin;font-family:"JetBrains Mono",monospace;
    font-size:clamp(10px,1.3vmin,13px);color:var(--dim);
    padding:.6vmin 1vmin;border:1px solid var(--line);border-radius:8px;align-self:center;
  }
  .item:hover .item-comments{color:#fff;border-color:rgba(255,255,255,.25)}

  .loading{
    display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:13px;
    padding:40px 0;letter-spacing:.1em;text-transform:uppercase;
  }
  .loading::after{content:"";width:6px;height:6px;background:var(--orange);border-radius:50%;margin-left:8px;animation:pulse 1s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}

  /* footer */
  .footer{display:flex;justify-content:space-between;align-items:center;font-family:"JetBrains Mono",monospace;font-size:clamp(9px,1.1vmin,12px);color:var(--dim);letter-spacing:.08em;text-transform:uppercase}
  .refresh{cursor:pointer}
  .refresh:hover{color:#fff}

  @media (max-height: 420px){
    .item-title{font-size:clamp(11px,1.6vmin,14px);-webkit-line-clamp:1}
  }
</style>
</head>
<body>
<div class="shell">
  <div class="top">
    <div class="brand"><span class="dot"></span><span>Xeneon · <em>Hacker News</em></span></div>
    <div class="feeds">
      <button class="feed active" data-feed="topstories">Top</button>
      <button class="feed" data-feed="newstories">New</button>
      <button class="feed" data-feed="beststories">Best</button>
      <button class="feed" data-feed="askstories">Ask</button>
      <button class="feed" data-feed="showstories">Show</button>
    </div>
  </div>

  <div class="list" id="list">
    <div class="loading">LOADING</div>
  </div>

  <div class="footer">
    <span id="updated">—</span>
    <span class="refresh" id="refreshBtn">↻ REFRESH</span>
  </div>
</div>

<script>
(() => {
  const HN = "https://hacker-news.firebaseio.com/v0";
  const LIMIT = 15;
  const REFRESH_MS = 5 * 60 * 1000;

  const $ = s => document.querySelector(s);
  let currentFeed = "topstories";
  let refreshTimer = null;

  const hostOf = url => {
    if (!url) return "news.ycombinator.com";
    try { return new URL(url).hostname.replace(/^www\./, ""); }
    catch(_) { return "link"; }
  };

  const timeAgo = s => {
    const diff = Math.floor((Date.now()/1000) - s);
    if (diff < 60) return `${diff}s`;
    if (diff < 3600) return `${Math.floor(diff/60)}m`;
    if (diff < 86400) return `${Math.floor(diff/3600)}h`;
    return `${Math.floor(diff/86400)}d`;
  };

  const itemUrl = id => `https://news.ycombinator.com/item?id=${id}`;

  const fetchItem = async id => {
    const r = await fetch(`${HN}/item/${id}.json`);
    return r.json();
  };

  const renderList = items => {
    const list = $("#list");
    list.innerHTML = "";
    items.forEach((it, i) => {
      if (!it) return;
      const href = it.url || itemUrl(it.id);
      const el = document.createElement("a");
      el.className = "item";
      el.href = href;
      el.target = "_blank";
      el.rel = "noreferrer";
      el.innerHTML = `
        <div class="item-rank">${i+1}</div>
        <div class="item-body">
          <div class="item-title">${escapeHtml(it.title || "—")}</div>
          <div class="item-meta">
            <span class="score">▲ ${it.score || 0}</span>
            <span class="host">${hostOf(it.url)}</span>
            <span>${timeAgo(it.time)}</span>
            <span>by ${escapeHtml(it.by || "—")}</span>
          </div>
        </div>
        <a class="item-comments" href="${itemUrl(it.id)}" target="_blank" rel="noreferrer" onclick="event.stopPropagation()">${it.descendants || 0} 💬</a>`;
      list.appendChild(el);
    });
    $("#updated").textContent = `UPDATED ${new Date().toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"})}`;
  };

  const escapeHtml = s => String(s || "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

  const load = async feed => {
    try {
      const r = await fetch(`${HN}/${feed}.json`);
      const ids = (await r.json()).slice(0, LIMIT);
      const items = await Promise.all(ids.map(fetchItem));
      renderList(items);
    } catch(e) {
      $("#list").innerHTML = `<div class="loading" style="color:#ff9f9f">ERROR: ${escapeHtml(e.message)}</div>`;
    }
  };

  const setFeed = f => {
    currentFeed = f;
    document.querySelectorAll(".feed").forEach(b => b.classList.toggle("active", b.dataset.feed === f));
    $("#list").innerHTML = `<div class="loading">LOADING</div>`;
    load(f);
  };

  document.querySelectorAll(".feed").forEach(b => b.onclick = () => setFeed(b.dataset.feed));
  $("#refreshBtn").onclick = () => load(currentFeed);

  // auto refresh
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(() => load(currentFeed), REFRESH_MS);

  load(currentFeed);
})();
</script>
</body>
</html>
